# 生产环境编排
# 使用方法： docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: pms2_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不开放外网端口，仅服务间访问
    healthcheck:
      # 🆕 必须带 -d：不加 -d 时 pg_isready 默认拿用户名当库名探测(=pms_prod)，
      #    而实际库叫 pms(POSTGRES_DB)，每10s探一次就往 postgres 日志刷一条
      #    "FATAL: database \"pms_prod\" does not exist"(虚增错误计数、干扰健康检查)。
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: pms2_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      # 🆕 关键修复：上传文件目录必须指向持久卷 /app/uploads(下方 volumes 挂载)。
      # 此前默认 data/files 在容器临时层，每次 up --build 重建容器即丢失全部上传文件
      # (DB 附件记录仍在→列表能显示但点开 404「文件已丢失」)。
      FILES_DIR: ${FILES_DIR:-/app/uploads}
      # 🆕 销售下单审批：销售员下单→销售主管审批→通过才派单各部门(可逆开关;默认关)
      SALES_ORDER_APPROVAL: ${SALES_ORDER_APPROVAL:-true}
      # 🆕 企业微信应用消息推送（留空=仅站内消息，不影响业务）。
      # 取值：企业微信后台→应用管理→自建应用：企业ID(CorpID) / 应用AgentId / 应用Secret；
      # 并把服务器公网IP加入该应用的「可信IP」白名单，否则发消息会被拒。
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_SECRET: ${WECOM_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    # 不开放外网端口，由 nginx 代理

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: pms2_frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: pms2_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot-www:/var/www/certbot:ro   # 🆕 HTTPS: ACME http-01 验证目录（enable-https.sh 用）
      - ./nginx/wecom-verify:/var/www/wecom:ro    # 🆕 企业微信「可信域名」验证文件目录
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
  nginx_logs:
