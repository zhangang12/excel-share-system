<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同辉项目管理 · 仓库管理（增量模块原型）</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  :root{ --primary:#2563eb; --primary-d:#1d4ed8; --primary-l:#dbeafe;
    --sidebar-bg:#1e293b; --sidebar-tx:#cbd5e1;
    --bd:#e2e8f0; --tx1:#0f172a; --tx2:#475569; --tx3:#94a3b8;
    --ok:#16a34a; --ok-l:#dcfce7; --warn:#d97706; --warn-l:#fef3c7; --danger:#dc2626; --danger-l:#fee2e2; --info-l:#e0f2fe; --info:#0369a1;
    --tbl-line:#94a3b8; --tbl-out:#64748b; --stripe:#f1f5f9; --hover:#dbeafe; }
  body{ font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif; color:var(--tx1); background:#f1f5f9; }
  .app{ display:flex; min-height:100vh; }
  .sidebar{ width:212px; background:var(--sidebar-bg); color:var(--sidebar-tx); flex:0 0 212px; box-shadow:0 0 24px rgba(0,0,0,.1); }
  .brand{ display:flex; align-items:center; gap:12px; padding:20px 16px 16px; border-bottom:1px solid rgba(255,255,255,.06); min-height:76px; }
  .brand .logo{ width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--primary),#6366f1); display:grid; place-items:center; font-size:20px; box-shadow:0 4px 12px rgba(37,99,235,.3); }
  .brand b{ color:#fff; font-size:17px; letter-spacing:.5px; }
  .nav{ padding-top:6px; }
  .nav a{ display:flex; align-items:center; gap:11px; padding:11px 18px; color:var(--sidebar-tx); cursor:pointer; font-size:14px; border-left:3px solid transparent; user-select:none; }
  .nav a:hover{ background:rgba(148,163,184,.12); color:#fff; } .nav a.active{ background:rgba(37,99,235,.22); color:#fff; border-left-color:var(--primary); font-weight:600; }
  .nav .ico{ width:18px; text-align:center; } .nav .group{ color:#64748b; font-size:11.5px; padding:13px 18px 5px; letter-spacing:.5px; }
  .nav a .cnt{ margin-left:auto; background:var(--danger); color:#fff; font-size:10px; border-radius:9px; padding:0 6px; }
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar{ height:58px; background:#fff; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:14px; padding:0 22px; position:sticky; top:0; z-index:6; }
  .crumb{ font-size:14px; color:var(--tx2); } .crumb b{ color:var(--tx1); } .spacer{ flex:1; }
  .roleSel{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--tx2); } .roleSel select{ padding:6px 10px; border:1px solid var(--bd); border-radius:7px; font-size:13px; cursor:pointer; }
  .bell{ font-size:19px; cursor:pointer; padding:6px; border-radius:8px; } .bell:hover{ background:#f1f5f9; }
  .inc-banner{ background:linear-gradient(90deg,#ecfdf5,#eff6ff); border-bottom:1px solid var(--bd); padding:9px 22px; font-size:12.5px; color:var(--tx2); display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
  .inc-banner b{ color:var(--tx1); } .lg{ display:inline-flex; align-items:center; gap:5px; } .lg .nw{ background:#16a34a; color:#fff; border-radius:5px; padding:0 6px; font-size:11px; }
  .content{ padding:22px; }
  .page-h{ display:flex; align-items:center; gap:12px; margin-bottom:6px; } .page-h h1{ font-size:21px; }
  .tag-dept{ font-size:12px; background:var(--primary-l); color:var(--primary); padding:2px 9px; border-radius:20px; }
  .inc{ font-size:11px; background:#16a34a; color:#fff; padding:2px 8px; border-radius:20px; }
  .page-desc{ color:var(--tx3); font-size:13px; margin-bottom:16px; }
  .btn{ border:none; border-radius:8px; padding:9px 16px; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-family:inherit; }
  .btn-primary{ background:var(--primary); color:#fff; } .btn-primary:hover{ background:var(--primary-d); }
  .btn-ghost{ background:#fff; border:1px solid var(--bd); color:var(--tx1); } .btn-ghost:hover{ border-color:var(--primary); color:var(--primary); }
  .btn-ok{ background:var(--ok); color:#fff; } .btn-warn{ background:var(--warn); color:#fff; } .btn-sm{ padding:6px 12px; font-size:13px; }
  .card{ background:#fff; border:1px solid var(--bd); border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); } .card+.card{ margin-top:16px; }
  .card-h{ padding:13px 16px; font-weight:700; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:8px; background:#f8fafc; font-size:14px; }
  .card-h.warn{ background:var(--warn-l); color:#92400e; border-bottom-color:#fcd34d; }
  .toolbar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  .toolbar input,.toolbar select{ padding:8px 11px; border:1px solid var(--bd); border-radius:8px; font-size:13px; font-family:inherit; background:#fff; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{ background:#f8fafc; color:var(--tx2); font-weight:700; text-align:left; padding:11px 14px; border-bottom:1px solid var(--bd); white-space:nowrap; font-size:12.5px; }
  tbody td{ padding:11px 14px; text-align:left; border-bottom:1px solid #f1f5f9; color:var(--tx1); }
  tbody tr:last-child td{ border-bottom:none; } tbody tr:hover td{ background:#f8fbff; }
  td.num,th.num{ text-align:right; font-variant-numeric:tabular-nums; } td.ctr,th.ctr{ text-align:center; }
  .muted{ color:var(--tx3); } .strong{ font-weight:700; }
  .pill{ font-size:12px; padding:2px 10px; border-radius:20px; font-weight:600; display:inline-block; white-space:nowrap; }
  .p-in{ background:var(--ok-l); color:var(--ok); } .p-out{ background:var(--info-l); color:var(--info); }
  .p-ok{ background:var(--ok-l); color:var(--ok); } .p-warn{ background:var(--warn-l); color:var(--warn); } .p-zero{ background:var(--danger-l); color:var(--danger); }
  .p-on{ background:var(--primary-l); color:var(--primary); } .p-off{ background:#f1f5f9; color:var(--tx3); }
  .qty{ font-variant-numeric:tabular-nums; font-weight:700; } .qty.low{ color:var(--warn); } .qty.zero{ color:var(--danger); }
  .loc{ font-family:ui-monospace,Consolas,monospace; font-size:12px; background:#f1f5f9; border-radius:5px; padding:1px 7px; color:var(--tx2); }
  .flag{ font-size:11px; background:var(--warn-l); color:var(--warn); border:1px solid #fcd34d; border-radius:5px; padding:0 6px; margin-left:5px; cursor:help; }
  .stat{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px; }
  .sb{ background:#fff; border:1px solid var(--bd); border-radius:12px; padding:16px 18px; box-shadow:0 1px 3px rgba(0,0,0,.04); position:relative; overflow:hidden; }
  .sb .v{ font-size:28px; font-weight:800; line-height:1.1; } .sb .l{ font-size:12.5px; color:var(--tx3); margin-top:5px; } .sb .ic{ position:absolute; right:14px; top:14px; font-size:22px; opacity:.5; }
  .sb.red{ background:linear-gradient(180deg,#fff,#fff5f5); border-color:#fecaca; } .sb.red .v{ color:var(--danger); }
  .sb.green .v{ color:var(--ok); } .sb.blue .v{ color:var(--primary); }
  .mask{ position:fixed; inset:0; background:rgba(15,23,42,.45); display:grid; place-items:center; z-index:50; }
  .dialog{ width:560px; max-width:94vw; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,.25); }
  .d-h{ padding:15px 20px; border-bottom:1px solid var(--bd); display:flex; align-items:center; } .d-h b{ font-size:16px; } .d-h .x{ margin-left:auto; cursor:pointer; color:var(--tx3); font-size:20px; }
  .d-b{ padding:20px; max-height:70vh; overflow:auto; } .d-f{ padding:13px 20px; border-top:1px solid var(--bd); display:flex; justify-content:flex-end; gap:10px; align-items:center; }
  .fg{ margin-bottom:15px; } .fg>label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; } .req-star{ color:var(--danger); }
  .fg input,.fg textarea,.fg select{ width:100%; padding:9px 11px; border:1px solid var(--bd); border-radius:8px; font-size:14px; font-family:inherit; } .fg textarea{ resize:vertical; min-height:50px; }
  .frow{ display:flex; gap:12px; } .frow .fg{ flex:1; }
  .seg{ display:flex; gap:8px; } .seg label{ flex:1; } .seg input{ display:none; } .seg .opt{ display:block; text-align:center; padding:10px; border:1px solid var(--bd); border-radius:9px; cursor:pointer; font-size:14px; font-weight:600; }
  .seg input:checked + .opt.in{ border-color:var(--ok); background:var(--ok-l); color:var(--ok); } .seg input:checked + .opt.out{ border-color:var(--info); background:var(--info-l); color:var(--info); }
  .docno{ font-family:ui-monospace,Consolas,monospace; font-size:12.5px; color:var(--tx2); margin-right:auto; }
  .hint{ background:var(--info-l); color:var(--info); border-radius:8px; padding:9px 12px; font-size:12.5px; }
  .ro-banner{ background:var(--warn-l); color:#92400e; border:1px solid #fcd34d; border-radius:9px; padding:10px 14px; font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .toast{ position:fixed; top:70px; left:50%; transform:translateX(-50%); color:#fff; padding:11px 18px; border-radius:10px; font-size:13.5px; z-index:99; box-shadow:0 10px 30px rgba(0,0,0,.3); max-width:80vw; }
  .empty{ padding:42px; text-align:center; color:var(--tx3); }
  tfoot td{ padding:11px 14px; border-top:2px solid var(--bd); font-weight:800; background:#f8fafc; }
  .future{ display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; } .future span{ font-size:11.5px; color:var(--tx3); background:#f1f5f9; border:1px dashed var(--bd); border-radius:6px; padding:2px 8px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"><div class="brand"><div class="logo">🏭</div><b>同辉项目管理</b></div><div class="nav" id="nav"></div></aside>
  <div class="main">
    <header class="topbar"><div class="crumb" id="crumb"></div><div class="spacer"></div>
      <div class="roleSel"><span>当前身份</span><select id="roleSelect" onchange="switchUser(this.value)"></select></div>
      <div class="bell">🔔</div>
    </header>
    <div class="inc-banner">
      <b>📦 仓库管理 · 增量模块</b> · 全新「仓库组」菜单，零侵入老页面
      <span class="lg"><span class="nw">🆕</span> 实时库存 · 单据化出入库 · 收发存汇总 · 安全库存预警 —— 替代 Excel 月度台账</span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modalRoot"></div><div id="toastRoot"></div>

<script>
/* ===== 角色（演示 可写 vs 只读） ===== */
const USERS={
  wh1:{name:"孙仓管",role:"仓库员",type:"wh"},
  whlead:{name:"郑主管",role:"仓库主管·消息推送人",type:"wh"},
  mgr:{name:"王经理",role:"管理层",type:"ro"},
  designer:{name:"张工",role:"设计师",type:"designer"},
};
function cu(){ return USERS[state.userId]; }
function canWrite(){ return cu().type==="wh"; }
function isDesigner(){ return cu().type==="designer"; }

/* ===== 物料主数据（取自样本「搅拌桨库存表.et」） ===== */
let MID=0;
function mat(name,spec,init,safety,loc,flag){ MID++; return {id:MID, code:"M"+String(MID).padStart(4,"0"), name, spec, cat:"搅拌桨", unit:"个", loc, init, safety, flag:flag||"", status:"启用"}; }
const materials=[
  mat("316勾式搅拌桨","5L",12,5,"A-01"),
  mat("304勾式搅拌桨","5L",7,5,"A-02"),
  mat("304搅拌桨","200ML",2,3,"A-03","名称错字：应为「搅拌浆」"),
  mat("316搅拌桨","500ML",8,5,"A-04"),
  mat("304搅拌浆","500ML",14,6,"A-05"),
  mat("304搅拌浆","1L",17,6,"B-01"),
  mat("304搅拌浆","2L",28,8,"B-02"),
  mat("304搅拌浆（老）","5L",25,8,"B-03","版本：老/新需合并判定"),
  mat("304搅拌浆","10L",18,6,"B-04"),
  mat("316搅拌桨","15L/20L",10,6,"C-01","型号漂移：原 15L，3月起变 15L/20L"),
  mat("304搅拌浆","15L/20L",14,6,"C-02","型号漂移：原 15L，3月起变 15L/20L"),
  mat("304搅拌浆","50L",4,5,"C-03"),
  mat("304搅拌浆","60L",8,4,"C-04"),
  mat("304搅拌浆","100L",2,3,"D-01"),
  mat("316搅拌桨","5L",0,5,"A-06","与首行 316勾式搅拌桨5L 疑似重复"),
  mat("304搅拌浆（新）","5L",0,8,"B-05","版本：老/新需合并判定"),
  mat("316搅拌桨","2L",0,5,"A-07"),
];
function M(id){ return materials.find(m=>m.id===id); }
function findM(name,spec){ return materials.find(m=>m.name===name&&m.spec===spec); }

/* ===== 出入库流水（取自样本 5月 真实动作） ===== */
let TID=0, RKn=0, CKn=0;
const txns=[];
function tx(name,spec,date,dir,qty,source,party){ const m=findM(name,spec); if(!m) return; TID++;
  const no=(dir==="in"?("RK"+date.replace(/-/g,"")+"-"+String(++RKn).padStart(3,"0")):("CK"+date.replace(/-/g,"")+"-"+String(++CKn).padStart(3,"0")));
  txns.push({id:TID,no,mid:m.id,date,dir,qty,source,party:party||"",op:"孙仓管"}); }
tx("304搅拌浆","50L","2026-05-17","out",4,"项目领料","2026-041M");
tx("304搅拌浆","60L","2026-05-22","out",2,"项目领料","2026-039");
tx("304搅拌浆","2L","2026-05-23","out",2,"项目领料","2026-039");
tx("316搅拌桨","15L/20L","2026-05-25","in",24,"采购入库","顺鑫供应");
tx("316搅拌桨","15L/20L","2026-05-25","out",4,"项目领料","2026-050");
tx("304搅拌浆","15L/20L","2026-05-25","in",20,"采购入库","顺鑫供应");
tx("304搅拌浆（老）","5L","2026-05-25","out",2,"项目领料","2026-041M");
tx("304搅拌浆","100L","2026-05-26","in",8,"采购入库","越欣发");
tx("304搅拌浆（老）","5L","2026-05-27","in",2,"退料入库","2026-038退料");
tx("316搅拌桨","5L","2026-05-27","in",24,"采购入库","顺鑫供应");
tx("316搅拌桨","5L","2026-05-27","out",4,"项目领料","2026-050");
tx("304搅拌浆（新）","5L","2026-05-27","in",56,"采购入库","华东阀门");
tx("316搅拌桨","2L","2026-05-27","in",35,"采购入库","顺鑫供应");
tx("304搅拌浆","15L/20L","2026-05-28","out",4,"项目领料","2026-043A");

const SRC_IN=["采购入库","退料入库","盘盈入库"];
const SRC_OUT=["项目领料","发货出库","报废损耗","盘亏出库"];

/* ===== 计算 ===== */
function stockOf(mid){ const m=M(mid); let s=m.init; txns.filter(t=>t.mid===mid).forEach(t=> s+=(t.dir==="in"?t.qty:-t.qty)); return s; }
function statusOf(m){ const s=stockOf(m.id); if(s<=0) return {k:"zero",t:"缺货"}; if(s<m.safety) return {k:"warn",t:"预警"}; return {k:"ok",t:"正常"}; }
function suggest(m){ return Math.max(0, m.safety - stockOf(m.id)); }
function lowList(){ return materials.filter(m=>stockOf(m.id)<m.safety); }
function monthTxns(mid,ym){ return txns.filter(t=>t.mid===mid && t.date.slice(0,7)===ym); }
function openBefore(mid,ym){ const m=M(mid); let s=m.init; txns.filter(t=>t.mid===mid && t.date.slice(0,7)<ym).forEach(t=> s+=(t.dir==="in"?t.qty:-t.qty)); return s; }
function periods(){ const set=new Set(txns.map(t=>t.date.slice(0,7))); set.add("2026-05"); return [...set].sort().reverse(); }
function today(){ return new Date().toISOString().slice(0,10); }

/* ===== 路由 ===== */
const state={ userId:"wh1", menu:"overview", kw:"", io2:"", period:"2026-05", io:null };
const MENUS=[
  {k:"overview",t:"库存总览",ico:"📊"},
  {k:"inout",t:"出入库登记",ico:"🔁",w:1},
  {k:"summary",t:"收发存汇总",ico:"📈"},
  {k:"txn",t:"出入库流水",ico:"📜"},
  {k:"material",t:"物料主数据",ico:"🧱",w:1},
];
function visibleMenus(){ if(isDesigner()) return [{k:"overview",t:"库存查看（只读）",ico:"📊"}]; return MENUS.filter(m=> !(m.w && !canWrite())); }
function renderNav(){ let h=`<div class="group">仓库组 🆕</div>`;
  visibleMenus().forEach(m=>{ const low=(m.k==="overview"&&lowList().length)?`<span class="cnt">${lowList().length}</span>`:"";
    h+=`<a class="${state.menu===m.k?'active':''}" onclick="go('${m.k}')"><span class="ico">${m.ico}</span>${m.t}${low}</a>`; });
  document.getElementById("nav").innerHTML=h;
}
function renderTop(){ const m=visibleMenus().find(x=>x.k===state.menu)||visibleMenus()[0];
  document.getElementById("crumb").innerHTML=`同辉项目管理 · <b>仓库组 / ${m?m.t:""}</b>`;
  document.getElementById("roleSelect").innerHTML=Object.keys(USERS).map(id=>`<option value="${id}" ${state.userId===id?'selected':''}>${USERS[id].name}（${USERS[id].role}）</option>`).join("");
}
function go(k){ state.menu=k; render(); }
function switchUser(id){ state.userId=id; if(!visibleMenus().find(m=>m.k===state.menu)) state.menu=visibleMenus()[0].k; render(); }
function render(){ renderNav(); renderTop();
  const map={overview:pageOverview,inout:pageInout,summary:pageSummary,txn:pageTxn,material:pageMaterial};
  document.getElementById("content").innerHTML=(map[state.menu]||pageOverview)();
}

/* ===== 库存总览（看板） ===== */
function pageOverview(){
  const ro=!canWrite();
  const low=lowList();
  const inN=txns.filter(t=>t.dir==="in"&&t.date.slice(0,7)===state.period).reduce((a,t)=>a+t.qty,0);
  const outN=txns.filter(t=>t.dir==="out"&&t.date.slice(0,7)===state.period).reduce((a,t)=>a+t.qty,0);
  const list=materials.filter(m=> !state.kw || (m.name+m.spec+m.code+m.loc).includes(state.kw));
  const rows=list.map(m=>{ const s=stockOf(m.id), st=statusOf(m);
    return `<tr>
      <td>${m.code}</td>
      <td class="strong">${m.name}${m.flag?`<span class="flag" title="${m.flag}">⚠</span>`:""}</td>
      <td>${m.spec}</td><td class="ctr"><span class="loc">${m.loc}</span></td><td class="ctr">${m.unit}</td>
      <td class="num"><span class="qty ${st.k==='warn'?'low':st.k==='zero'?'zero':''}">${s}</span></td>
      <td class="num muted">${m.safety}</td>
      <td class="ctr"><span class="pill p-${st.k}">${st.t}</span></td>
      ${ro?'':`<td class="ctr"><button class="btn btn-ok btn-sm" onclick="openIO(${m.id},'in')">入库</button> <button class="btn btn-ghost btn-sm" onclick="openIO(${m.id},'out')">出库</button></td>`}
    </tr>`; }).join("");
  return `
    <div class="page-h"><h1>${isDesigner()?'库存查看':'库存总览'}</h1><span class="tag-dept">仓库组</span><span class="inc">🆕</span></div>
    <div class="page-desc">实时库存由出入库单据自动结算（期初 + 入 − 出），口径唯一、无需手工结转。</div>
    ${isDesigner()?`<div class="ro-banner">👁 设计师只读：仅查看库存，无任何录入/编辑入口（满足"设计部读取库存表，仅查看"）。</div>`:""}
    ${cu().type==='ro'?`<div class="ro-banner">👁 管理层只读：可查看与导出（导出走审批），不直接修改库存。</div>`:""}
    <div class="stat">
      <div class="sb blue"><div class="ic">🧱</div><div class="v">${materials.length}</div><div class="l">物料种类</div></div>
      <div class="sb ${low.length?'red':''}"><div class="ic">⚠</div><div class="v">${low.length}</div><div class="l">需补货（低于安全库存）</div></div>
      <div class="sb green"><div class="ic">⬇</div><div class="v">${inN}</div><div class="l">本月入库（${state.period}）</div></div>
      <div class="sb"><div class="ic">⬆</div><div class="v">${outN}</div><div class="l">本月出库（${state.period}）</div></div>
    </div>
    ${low.length?`<div class="card" style="margin-bottom:16px"><div class="card-h warn">⚠ 库存预警 · 建议补货（${low.length}）</div>
      <table><thead><tr><th>物料</th><th>规格</th><th class="ctr">库位</th><th class="num">当前库存</th><th class="num">安全库存</th><th class="num">建议补货</th>${ro?'':'<th class="ctr">操作</th>'}</tr></thead>
      <tbody>${low.map(m=>{const s=stockOf(m.id);return `<tr><td class="strong">${m.name}</td><td>${m.spec}</td><td class="ctr"><span class="loc">${m.loc}</span></td><td class="num"><span class="qty ${s<=0?'zero':'low'}">${s}</span></td><td class="num muted">${m.safety}</td><td class="num strong" style="color:var(--warn)">+${suggest(m)}</td>${ro?'':`<td class="ctr"><button class="btn btn-ok btn-sm" onclick="openIO(${m.id},'in')">去入库</button></td>`}</tr>`;}).join("")}</tbody></table></div>`:""}
    <div class="toolbar">
      <input type="text" placeholder="🔍 搜索 名称 / 规格 / 编码 / 库位" value="${state.kw}" oninput="state.kw=this.value;refreshOv()">
      <select disabled><option>分类：搅拌桨</option></select>
      ${ro?'':`<button class="btn btn-primary btn-sm" onclick="openIO(null,'in')">＋ 入库</button> <button class="btn btn-warn btn-sm" onclick="openIO(null,'out')">－ 出库</button>`}
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="toast('已提交导出申请，等待管理层审批','warn')">⬇ 导出</button>
    </div>
    <div class="card"><div class="card-h">📊 物料库存清单</div>
      <table id="ovT"><thead><tr><th>编码</th><th>名称</th><th>规格</th><th class="ctr">库位</th><th class="ctr">单位</th><th class="num">当前库存</th><th class="num">安全库存</th><th class="ctr">状态</th>${ro?'':'<th class="ctr">操作</th>'}</tr></thead>
      <tbody>${rows||`<tr><td colspan="9" class="empty">无匹配物料</td></tr>`}</tbody></table>
    </div>`;
}
function refreshOv(){ const ro=!canWrite(); const list=materials.filter(m=> !state.kw || (m.name+m.spec+m.code+m.loc).includes(state.kw));
  const tb=document.querySelector("#ovT tbody"); if(!tb) return;
  tb.innerHTML=list.map(m=>{ const s=stockOf(m.id), st=statusOf(m);
    return `<tr><td>${m.code}</td><td class="strong">${m.name}${m.flag?`<span class="flag" title="${m.flag}">⚠</span>`:""}</td><td>${m.spec}</td><td class="ctr"><span class="loc">${m.loc}</span></td><td class="ctr">${m.unit}</td><td class="num"><span class="qty ${st.k==='warn'?'low':st.k==='zero'?'zero':''}">${s}</span></td><td class="num muted">${m.safety}</td><td class="ctr"><span class="pill p-${st.k}">${st.t}</span></td>${ro?'':`<td class="ctr"><button class="btn btn-ok btn-sm" onclick="openIO(${m.id},'in')">入库</button> <button class="btn btn-ghost btn-sm" onclick="openIO(${m.id},'out')">出库</button></td>`}</tr>`;
  }).join("")||`<tr><td colspan="9" class="empty">无匹配物料</td></tr>`;
}

/* ===== 出入库登记 ===== */
function pageInout(){
  let list=[...txns].reverse(); if(state.io2) list=list.filter(t=>t.dir===state.io2);
  return `
    <div class="page-h"><h1>出入库登记</h1><span class="tag-dept">仓库组</span><span class="inc">🆕</span></div>
    <div class="page-desc">每次出入库生成一张单据（自动单号），即时更新库存；出库可关联项目，实现"哪个项目领了什么料"的追溯。</div>
    <div class="toolbar">
      <button class="btn btn-ok" onclick="openIO(null,'in')">＋ 入库（采购到货 / 退料 / 盘盈）</button>
      <button class="btn btn-warn" onclick="openIO(null,'out')">－ 出库（项目领料 / 发货 / 报废）</button>
      <select style="margin-left:auto" onchange="state.io2=this.value;render()">
        <option value="">全部单据</option><option value="in" ${state.io2==='in'?'selected':''}>仅入库</option><option value="out" ${state.io2==='out'?'selected':''}>仅出库</option>
      </select>
    </div>
    <div class="card"><div class="card-h">📜 最近单据</div>
      <table><thead><tr><th>单号</th><th class="ctr">类型</th><th>物料</th><th>规格</th><th class="num">数量</th><th class="ctr">日期</th><th>来源/用途</th><th>供应商/项目</th><th>经办人</th></tr></thead>
      <tbody>${list.map(t=>{const m=M(t.mid);return `<tr><td class="loc">${t.no}</td><td class="ctr"><span class="pill ${t.dir==='in'?'p-in':'p-out'}">${t.dir==='in'?'入库':'出库'}</span></td><td class="strong">${m.name}</td><td>${m.spec}</td><td class="num qty">${t.qty}</td><td class="ctr">${t.date}</td><td>${t.source}</td><td>${t.party||'—'}</td><td>${t.op}</td></tr>`;}).join("")}</tbody></table>
    </div>`;
}
function openIO(mid,dir){
  if(!canWrite()){ toast("当前身份为只读，无登记权限","danger"); return; }
  state.io={mid:mid||materials[0].id, dir};
  const opts=materials.map(m=>`<option value="${m.id}" ${m.id===state.io.mid?'selected':''}>${m.code} · ${m.name} ${m.spec}（现存 ${stockOf(m.id)}，库位 ${m.loc}）</option>`).join("");
  const srcs=(dir==='in'?SRC_IN:SRC_OUT).map(s=>`<option>${s}</option>`).join("");
  const noPrev=(dir==='in'?'RK':'CK')+today().replace(/-/g,'')+'-'+String((dir==='in'?RKn:CKn)+1).padStart(3,'0');
  modal(`
    <div class="d-h"><b>${dir==='in'?'➕ 入库登记':'➖ 出库登记'}</b><span class="x" onclick="closeModal()">×</span></div>
    <div class="d-b">
      <div class="fg"><label>单据类型</label>
        <div class="seg">
          <label><input type="radio" name="iod" value="in" ${dir==='in'?'checked':''} onchange="switchIO('in')"><span class="opt in">入库</span></label>
          <label><input type="radio" name="iod" value="out" ${dir==='out'?'checked':''} onchange="switchIO('out')"><span class="opt out">出库</span></label>
        </div></div>
      <div class="fg"><label>物料 <span class="req-star">*</span></label><select id="ioMat" onchange="syncLoc()">${opts}</select></div>
      <div class="frow">
        <div class="fg"><label>数量 <span class="req-star">*</span></label><input type="number" id="ioQty" min="1" value="1"></div>
        <div class="fg"><label>业务日期 <span class="req-star">*</span></label><input type="date" id="ioDate" value="${today()}"></div>
      </div>
      <div class="frow">
        <div class="fg"><label>${dir==='in'?'入库来源':'出库用途'}</label><select id="ioSrc">${srcs}</select></div>
        <div class="fg"><label>库位</label><input type="text" id="ioLoc" value="${M(state.io.mid).loc}"></div>
      </div>
      <div class="fg"><label>${dir==='in'?'供应商 / 来源单位':'关联项目编号（领料追溯）'}</label><input type="text" id="ioParty" placeholder="${dir==='in'?'如 顺鑫供应':'如 2026-050'}"></div>
      <div class="fg"><label>备注</label><textarea id="ioRemark" placeholder="选填"></textarea></div>
      <div class="hint">提交后立即生成单据并刷新库存；如需纠错，到「出入库流水」对该单<b>冲红</b>（生成反向单据），不做物理删除。</div>
    </div>
    <div class="d-f"><span class="docno">单号 ${noPrev}</span><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="submitIO()">提交</button></div>`);
}
function syncLoc(){ const m=M(+document.getElementById("ioMat").value); const l=document.getElementById("ioLoc"); if(l) l.value=m.loc; }
function switchIO(dir){ state.io.dir=dir; openIO(+document.getElementById("ioMat").value,dir); }
function submitIO(){
  const mid=+document.getElementById("ioMat").value, qty=+document.getElementById("ioQty").value, date=document.getElementById("ioDate").value;
  const dir=state.io.dir, src=document.getElementById("ioSrc").value, party=document.getElementById("ioParty").value.trim();
  if(!qty||qty<1){ toast("数量需为正整数","danger"); return; }
  if(dir==="out" && qty>stockOf(mid)){ toast("出库数量超过当前库存，请核对","danger"); return; }
  TID++; const no=(dir==="in"?("RK"+date.replace(/-/g,"")+"-"+String(++RKn).padStart(3,"0")):("CK"+date.replace(/-/g,"")+"-"+String(++CKn).padStart(3,"0")));
  txns.push({id:TID,no,mid,date,dir,qty,source:src,party,op:cu().name});
  closeModal(); const m=M(mid); toast(`${dir==='in'?'入库':'出库'}成功 ${no}：${m.name} ${m.spec} ${qty}${m.unit}，现存 ${stockOf(mid)}`,"ok"); render();
}

/* ===== 收发存汇总（替代 31 列月表） ===== */
function pageSummary(){
  const p=state.period;
  let tin=0,tout=0,tend=0;
  const rows=materials.map(m=>{
    let open, inn, out;
    if(p==="all"){ open=m.init; const ts=txns.filter(t=>t.mid===m.id); inn=ts.filter(t=>t.dir==='in').reduce((a,t)=>a+t.qty,0); out=ts.filter(t=>t.dir==='out').reduce((a,t)=>a+t.qty,0); }
    else { open=openBefore(m.id,p); const ts=monthTxns(m.id,p); inn=ts.filter(t=>t.dir==='in').reduce((a,t)=>a+t.qty,0); out=ts.filter(t=>t.dir==='out').reduce((a,t)=>a+t.qty,0); }
    const end=open+inn-out; tin+=inn; tout+=out; tend+=end;
    const low=end<m.safety;
    return `<tr><td>${m.code}</td><td class="strong">${m.name}${m.flag?`<span class="flag" title="${m.flag}">⚠</span>`:""}</td><td>${m.spec}</td><td class="ctr"><span class="loc">${m.loc}</span></td>
      <td class="num">${open}</td><td class="num" style="color:var(--ok)">${inn||'·'}</td><td class="num" style="color:var(--info)">${out||'·'}</td>
      <td class="num"><span class="qty ${low?'low':''}">${end}</span></td></tr>`;
  }).join("");
  return `
    <div class="page-h"><h1>收发存汇总</h1><span class="tag-dept">仓库组</span><span class="inc">🆕 替代 Excel 月表</span></div>
    <div class="page-desc">行业标准库存报表：<b>期初结存 + 本期入库 − 本期出库 = 期末结存</b>。比 31 列日表清爽，可一键导出对账。</div>
    <div class="toolbar">
      <span>统计区间</span>
      <select onchange="state.period=this.value;render()">
        ${periods().map(v=>`<option value="${v}" ${v===p?'selected':''}>${v} 月</option>`).join("")}
        <option value="all" ${p==='all'?'selected':''}>全部（累计至今）</option>
      </select>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="toast('已提交导出申请（Excel/PDF），等待管理层审批','warn')">⬇ 导出收发存表</button>
    </div>
    <div class="card"><div class="card-h">📈 收发存表 · ${p==='all'?'累计':p+' 月'} · 搅拌桨</div>
      <table><thead><tr><th>编码</th><th>名称</th><th>规格</th><th class="ctr">库位</th><th class="num">期初结存</th><th class="num">本期入库</th><th class="num">本期出库</th><th class="num">期末结存</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="5" class="num">合计</td><td class="num" style="color:var(--ok)">${tin}</td><td class="num" style="color:var(--info)">${tout}</td><td class="num">${tend}</td></tr></tfoot></table>
    </div>`;
}

/* ===== 出入库流水（明细账） ===== */
function pageTxn(){
  let list=[...txns].reverse(); if(state.io2) list=list.filter(t=>t.dir===state.io2);
  return `
    <div class="page-h"><h1>出入库流水</h1><span class="tag-dept">仓库组</span></div>
    <div class="page-desc">唯一事实来源：每笔出入库留痕、可追溯到经办人/项目/单据；纠错用「冲红」生成反向单据，不物理删除。</div>
    <div class="toolbar">
      <select onchange="state.io2=this.value;render()"><option value="">全部类型</option><option value="in" ${state.io2==='in'?'selected':''}>仅入库</option><option value="out" ${state.io2==='out'?'selected':''}>仅出库</option></select>
      <span class="muted">共 ${list.length} 笔</span>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="toast('已提交导出申请，等待管理层审批','warn')">⬇ 导出</button>
    </div>
    <div class="card"><div class="card-h">📜 流水明细</div>
      <table><thead><tr><th>单号</th><th class="ctr">类型</th><th>物料</th><th>规格</th><th class="num">数量</th><th class="ctr">日期</th><th>来源/用途</th><th>供应商/项目</th><th>经办人</th>${canWrite()?'<th class="ctr">操作</th>':''}</tr></thead>
      <tbody>${list.map(t=>{const m=M(t.mid);return `<tr><td class="loc">${t.no}</td><td class="ctr"><span class="pill ${t.dir==='in'?'p-in':'p-out'}">${t.dir==='in'?'入库':'出库'}</span></td><td class="strong">${m.name}</td><td>${m.spec}</td><td class="num qty">${t.qty}</td><td class="ctr">${t.date}</td><td>${t.source}</td><td>${t.party||'—'}</td><td>${t.op}</td>${canWrite()?`<td class="ctr"><button class="btn btn-ghost btn-sm" onclick="redTx(${t.id})">冲红</button></td>`:''}</tr>`;}).join("")}</tbody></table>
    </div>`;
}
function redTx(id){ const t=txns.find(x=>x.id===id); if(!t) return; TID++; const date=today();
  const no=(t.dir==='in'?("CK"+date.replace(/-/g,"")+"-"+String(++CKn).padStart(3,"0")):("RK"+date.replace(/-/g,"")+"-"+String(++RKn).padStart(3,"0")));
  txns.push({id:TID,no,mid:t.mid,date,dir:t.dir==='in'?'out':'in',qty:t.qty,source:"冲红",party:"冲销 "+t.no,op:cu().name}); toast("已生成冲红反向单据 "+no,"ok"); render(); }

/* ===== 物料主数据 ===== */
function pageMaterial(){
  const dirty=materials.filter(m=>m.flag);
  const rows=materials.map(m=>`<tr>
    <td>${m.code}</td><td class="strong">${m.name}</td><td>${m.spec}</td><td>${m.cat}</td><td class="ctr"><span class="loc">${m.loc}</span></td><td class="ctr">${m.unit}</td>
    <td class="num muted">${m.init}</td><td class="num">${m.safety}</td><td class="num qty">${stockOf(m.id)}</td>
    <td>${m.flag?`<span class="flag" title="${m.flag}">⚠ 待清洗</span>`:'<span class="muted">—</span>'}</td>
    <td class="ctr"><span class="pill ${m.status==='启用'?'p-on':'p-off'}">${m.status}</span></td>
    <td class="ctr"><button class="btn btn-ghost btn-sm" onclick="toast('原型示意：编辑物料','info')">编辑</button> <button class="btn btn-ghost btn-sm" onclick="toast('原型示意：合并到主物料并迁移流水','info')">合并</button></td>
  </tr>`).join("");
  return `
    <div class="page-h"><h1>物料主数据</h1><span class="tag-dept">仓库组</span><span class="inc">🆕</span></div>
    <div class="page-desc">物料身份由「编码」固定，名称受控、规格为属性、统一库位与单位 —— 从源头消灭 Excel 的错字、型号漂移与重复行。</div>
    <div class="toolbar">
      <button class="btn btn-primary btn-sm" onclick="toast('原型示意：新增物料','info')">＋ 新增物料</button>
      <button class="btn btn-ghost btn-sm" onclick="toast('原型示意：从 Excel 导入历史并自动去重清洗','info')">⬆ Excel 历史导入</button>
      ${dirty.length?`<span class="flag" style="margin-left:auto">⚠ ${dirty.length} 项需数据清洗（错字 / 型号漂移 / 老新重复）</span>`:''}
    </div>
    <div class="card"><div class="card-h">🧱 物料清单（${materials.length}）</div>
      <table><thead><tr><th>编码</th><th>名称</th><th>规格</th><th>分类</th><th class="ctr">库位</th><th class="ctr">单位</th><th class="num">建档期初</th><th class="num">安全库存</th><th class="num">当前库存</th><th>数据质量</th><th class="ctr">状态</th><th class="ctr">操作</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    <div class="future">
      <span>后续可扩展：批次/序列号</span><span>条码扫码出入库</span><span>ABC 分类</span><span>呆滞料预警</span><span>多仓库/多库位</span><span>库存金额核算</span>
    </div>`;
}

/* ===== 通用 ===== */
function modal(h){ document.getElementById("modalRoot").innerHTML=`<div class="mask" onclick="if(event.target===this)closeModal()"><div class="dialog">${h}</div></div>`; }
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }
function toast(msg,type){ const c=type==="ok"?"#16a34a":type==="danger"?"#dc2626":type==="warn"?"#d97706":"#0f172a"; const r=document.getElementById("toastRoot"); r.innerHTML=`<div class="toast" style="background:${c}">${type==='danger'?'⚠':type==='ok'?'✓':type==='warn'?'⏳':'ℹ'} ${msg}</div>`; setTimeout(()=>r.innerHTML="",2800); }

render();
</script>
</body>
</html>
