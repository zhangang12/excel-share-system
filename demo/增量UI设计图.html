<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同辉项目管理 · 增量 UI 设计图（基于现有系统）</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  :root{ --primary:#2563eb; --primary-d:#1d4ed8; --primary-l:#dbeafe;
    --sidebar-bg:#1e293b; --sidebar-tx:#cbd5e1;
    --bd:#e2e8f0; --tx1:#0f172a; --tx2:#475569; --tx3:#94a3b8;

    --tbl-line:#94a3b8; --tbl-out:#64748b; --stripe:#e2e8f0; --hover:#dbeafe; }
  body{ font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif; color:var(--tx1); background:#f1f5f9; }
  .app{ display:flex; min-height:100vh; }
  .sidebar{ width:212px; background:var(--sidebar-bg); color:var(--sidebar-tx); flex:0 0 212px; box-shadow:0 0 24px rgba(0,0,0,.1); }
  .brand{ display:flex; align-items:center; gap:12px; padding:20px 16px 16px; border-bottom:1px solid rgba(255,255,255,.06); min-height:76px; }

  .brand b{ color:#fff; font-size:17px; letter-spacing:.5px; }
  .nav{ padding-top:6px; }

  .nav a:hover{ background:rgba(148,163,184,.12); color:#fff; } .nav a.active{ background:rgba(37,99,235,.22); color:#fff; border-left-color:var(--primary); font-weight:600; }
  .nav .ico{ width:18px; text-align:center; } .nav .group{ color:#64748b; font-size:11.5px; padding:13px 18px 5px; letter-spacing:.5px; }
  .nav a.new::after{ content:"🆕"; margin-left:auto; font-size:11px; } .nav a .cnt{ margin-left:auto; background:var(--danger); color:#fff; font-size:10px; border-radius:9px; padding:0 6px; }
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }

  .content{ padding:22px; }
  .page-h{ display:flex; align-items:center; gap:12px; margin-bottom:6px; } .page-h h1{ font-size:21px; }

  .btn-ok{ background:var(--ok); color:#fff; } .btn-sm{ padding:6px 12px; font-size:13px; }

  .code{ color:var(--primary); font-weight:700; cursor:pointer; } .code:hover{ text-decoration:underline; } .muted{ color:var(--tx3); }

  .code-cell:hover .float-order{ opacity:1; pointer-events:auto; } .float-order:hover{ background:var(--primary-d); }

  .eff{ font-weight:800; } .eff-good{ color:var(--ok); } .eff-bad{ color:var(--danger); }

  .t{ background:#fff; border:1px solid var(--bd); border-left:4px solid var(--primary); border-radius:12px; padding:16px 18px; box-shadow:0 2px 8px rgba(15,23,42,.05); transition:transform .15s,box-shadow .15s; } .t:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(15,23,42,.10); } .t.urgent{ border-left-color:var(--danger); } .t.assign{ border-left-color:var(--warn); }
  .t-h{ display:flex; align-items:center; gap:8px; margin-bottom:6px; } .t-h .code{ font-size:16px; font-weight:800; } .t-name{ color:var(--tx2); font-size:13px; margin-bottom:12px; }
  .assign-bar{ display:flex; align-items:flex-end; gap:10px; margin-top:14px; padding-top:13px; border-top:1px dashed var(--bd); flex-wrap:wrap; } .assign-bar .field{ margin:0; flex:1; min-width:140px; }
  /* 自定义下拉（替代原生 select 的丑陋系统列表） */

  .dd-trigger{ width:100%; display:flex; align-items:center; gap:8px; padding:8px 11px; border:1px solid var(--bd); border-radius:8px; background:#fff; font-size:13px; cursor:pointer; font-family:inherit; color:var(--tx1); transition:border-color .12s, box-shadow .12s; }

  .check{ display:flex; flex-direction:column; gap:6px; margin:6px 0 4px; } .check .ci{ display:flex; align-items:center; gap:8px; font-size:13px; } .check .ci .dot{ width:16px; height:16px; border-radius:50%; display:grid; place-items:center; font-size:11px; color:#fff; } .ci.ok .dot{ background:var(--ok); } .ci.no .dot{ background:var(--danger); }

function startTask(id){ const o=state.orders.find(x=>x.id===id); const s=document.getElementById("s_"+id).value,e=document.getElementById("e_"+id).value; if(!s||!e){toast("请填时间","warn");return;} if(e<s){toast("预计完成不能早于开始","warn");return;} o.start=s;o.dueEnd=e;o.status="drawing"; const pj=state.projects.find(p=>p.code===o.code); if(pj){ if(o.dept==="design"){ pj.drawStart=s; pj.designer=workerName("design",o.wid); } else if(o.dept==="electric"){ pj.elec=workerName("electric",o.wid); } } toast("已开始，已回传"+(o.dept==="design"?"设计师":(o.dept==="electric"?"电工":"负责人"))+"到项目目录","ok"); render(); }
function reopenTask(id){ const o=state.orders.find(x=>x.id===id); const names=(o.outputs||[]).map(f=>f.n); const dn=DEPTS[o.dept].name;
  const sh=shipmentOf(o.code); if(sh) sh.materials=sh.materials.filter(m=>!(m.from===dn && names.includes(m.name)));

function pkgFiles(p){ const x=p&&p.sheetPkg; return Array.isArray(x)?x:(x?[x]:[]); }
function uploadStart(id,k,input){ const files=[...(input.files||[])]; if(!files.length) return; const o=state.orders.find(x=>x.id===id); const d=DEPTS[o.dept]; const so=(d.startOutputs||[]).find(x=>x.k===k); if(!so) return; o.startUploaded=o.startUploaded||{}; const arr=(o.startUploaded[k]=o.startUploaded[k]||[]);
  files.forEach(f=>{ const item={n:f.name,t:so.t}; arr.push(item);
    if(so.to==="purchase"){ state.purchaseInbox.unshift({code:o.code,from:d.name,name:f.name,t:so.t,time:new Date().toLocaleString("zh-CN")}); const p=state.projects.find(x=>x.code===o.code); if(p&&o.dept==="electric"){ p.elecPOFile={n:f.name,t:so.t}; p.elecPO=p.elecPO||[]; } }
    else if(so.to==="logistics"){ const sh=shipmentOf(o.code); if(sh) sh.materials.push({from:d.name,name:f.name,t:so.t}); }
    else if(so.to==="sheet"){ const p=state.projects.find(x=>x.code===o.code); if(p){ if(!Array.isArray(p.sheetPkg)) p.sheetPkg=pkgFiles(p); p.sheetPkg.push(item); } }
  });
  if(so.to==="sheet") pushWx("sm1",`设计部已上传 ${o.code} PDF图纸包 ${files.length} 个文件，请下载`);
  toast(`${so.label} 已推送${DOWN[so.to].name}（${files.length}个）`,"ok"); render(); }
function removeStart(id,k,idx){ const o=state.orders.find(x=>x.id===id); if(!o||!o.startUploaded||!o.startUploaded[k]) return; const so=(DEPTS[o.dept].startOutputs||[]).find(x=>x.k===k); const rm=o.startUploaded[k].splice(idx,1)[0]; if(!rm) return;
  if(so&&so.to==="sheet"){ const p=state.projects.find(x=>x.code===o.code); if(p&&Array.isArray(p.sheetPkg)){ const i=p.sheetPkg.findIndex(f=>f.n===rm.n); if(i>=0) p.sheetPkg.splice(i,1); } }
  else if(so&&so.to==="purchase"){ state.purchaseInbox=state.purchaseInbox.filter(it=>!(it.code===o.code&&it.name===rm.n&&it.from===DEPTS[o.dept].name)); }
  else if(so&&so.to==="logistics"){ const sh=shipmentOf(o.code); if(sh) sh.materials=sh.materials.filter(m=>!(m.from===DEPTS[o.dept].name&&m.name===rm.n)); }
  toast(`已移除 ${rm.n}`,"ok"); render(); }

function pickOut(k,t,input){ const f=input.files[0]; if(!f) return; state.completeFiles[k]={n:f.name,t}; document.getElementById("ost_"+k).textContent="✓ "+f.name; }
function confirmComplete(){

  o.status="done"; o.done=today(); o.notify=notify; o.outputs=Object.values(state.completeFiles);
  if(o.dept==="design"){ const p=state.projects.find(p=>p.code===o.code); if(p)p.drawEnd=o.done; }
  d.outputs.forEach(ot=>{ const f=state.completeFiles[ot.k]; if(!f) return; if(ot.to==="logistics"){ const sh=shipmentOf(o.code); if(sh) sh.materials.push({from:d.name,name:f.n,t:f.t}); } if(ot.to==="purchase"){ state.purchaseInbox.unshift({code:o.code,from:d.name,name:f.n,t:f.t,time:new Date().toLocaleString("zh-CN")}); } if(ot.to==="sheet"){ const pp=state.projects.find(x=>x.code===o.code); if(pp) pp.sheetPkg={n:f.n,t:f.t}; pushWx("sm1",`设计完成·${o.code} PDF图纸包已推送钣金组：${f.n}`); } });
  pushWx(notify, `【${d.name}·${o.code}】${workerName(o.dept,o.wid)} 已完成${d.dl}${o.outputs.length?'，并上传：'+o.outputs.map(f=>f.n).join("、"):''}。`);
  if(o.dueEnd&&o.done>o.dueEnd) pushOverdue(o,d);
  closeModal(); toast(`已完成，已企业微信通知 ${uName(notify)}${o.outputs.length?'，产物已推送下游':''}`,"ok"); render();
}
function pushWx(toId,text){ state.messages.unshift({read:false,to:toId,kind:"wx",time:new Date().toLocaleString("zh-CN"),text:"📲 企业微信："+text}); }
function leadOf(dept){ return dept==="design"?"dlead":dept==="electric"?"elead":dept==="produce"?"pm":"lead"; }
function pushOverdue(o,d){ const tm=new Date().toLocaleString("zh-CN"); const txt=`【${d.name}逾期·推送主管】${o.code} ${o.name} 预计 <b>${o.dueEnd}</b>、实际 <b>${o.done}</b>，效率 <b>${effOf(o)}%</b>。负责人：${workerName(o.dept,o.wid)}`;
  state.messages.unshift({read:false,to:leadOf(o.dept),kind:"warn",time:tm,text:txt});
  state.messages.unshift({read:false,to:"mgr",kind:"warn",time:tm,text:"（抄送管理层）"+txt}); }

function effOf(o){ if(!o||o.status!=="done"||!o.start||!o.dueEnd||!o.done) return null; const plan=days(o.start,o.dueEnd),act=days(o.start,o.done); return Math.round(act/Math.max(plan,1)*100); /* C3：预计用时0按1天 */ }
function effCell(o){ const e=effOf(o); if(e==null) return '<span class="muted">—</span>'; return `<span class="eff ${e<=100?'eff-good':'eff-bad'}" title="实际用时 ÷ 预计用时">${e}%</span>`; }
// 汇总一个任务单已上传的全部文件：起始上传(图纸包/采购清单等) + 设计图纸包(项目级) + 完成产物，按文件名去重
function orderFiles(o){ const sf=o.startUploaded?Object.values(o.startUploaded).flat():[]; const pf=o.dept==="design"?pkgFiles(state.projects.find(p=>p.code===o.code)):[]; const outs=o.outputs||[]; const seen=new Set(); return [...sf,...pf,...outs].filter(f=>f&&f.n&&!seen.has(f.n)&&seen.add(f.n)); }
function orderFilesCell(o){ const fs=orderFiles(o); return fs.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${fs.map(fileChip).join("")}</div>`:'<span class="muted">—</span>'; }

function submitOrder(){ const dept=state.orderDept; const wid=document.getElementById("f_worker").value; const req=document.getElementById("f_req").value.trim(); const{code:c,name:nm}=state.orderFor;

function deptDoneState(code,k){ const os=state.orders.filter(o=>o.dept===k&&o.code===code&&o.status!=="作废"); if(!os.length) return {t:"未下单",ok:false,na:true}; return {t:os.every(o=>o.status==="done")?"已完成":"进行中",ok:os.every(o=>o.status==="done"),na:false}; }
function shipReady(code){ let any=false; for(const k of ["design","electric","produce"]){ const st=deptDoneState(code,k); if(!st.na){ any=true; if(!st.ok) return false; } } return any; }
function pageLogistics(){
  const cell=(s,dn)=>{ const ms=s.materials.filter(m=>m.from===dn); return ms.length?ms.map(fileChip).join(" "):'<span class="muted">暂无</span>'; };
  const pst=(code)=>{ const st=deptDoneState(code,"produce"); const c=st.ok?'p-done':(st.na?'p-pending':'p-drawing'); return `<span class="pill ${c}">${st.t}</span>`; };
  const recv=(s)=>{ const r=s.receiver; return `<div style="text-align:left;min-width:160px">${r?`<div><b>${r.name}</b></div><div style="font-size:12px;color:var(--tx2)">📞 ${r.phone}</div><div style="font-size:12px;color:var(--tx3)">📍 ${r.addr}</div>`:'<span class="muted">待完善</span>'} <a style="font-size:11px;color:var(--primary);cursor:pointer" onclick="event.stopPropagation();openReceiver('${s.code}')">✏️ 编辑</a></div>`; };
  const gate=(s)=>{ if(s.status==="已发货") return s.invoice?fileChip(s.invoice):'—'; const r=shipReady(s.code); return r?`<button class="btn btn-primary btn-sm" onclick="openShip('${s.code}')">📦 已发货（传发货单）</button>`:`<button class="btn btn-ghost btn-sm" disabled style="opacity:.5;cursor:not-allowed" title="设计/电工/生产 均完成后才可发货（D5）">⏳ 待部门完成</button>`; };
  const rows=state.shipments.map(s=>`<tr><td><span class="code" onclick="openDetail('${s.code}')">${s.code}</span></td><td>${s.name}</td>
    <td>${cell(s,"设计部")}</td><td>${cell(s,"电工部")}</td><td>${pst(s.code)}</td><td>${cell(s,"仓库组")}</td>
    <td>${recv(s)}</td>
    <td>${s.status==="已发货"?'<span class="pill p-done">已发货</span>':(shipReady(s.code)?'<span class="pill p-ship">可发货</span>':'<span class="pill p-pending">待齐</span>')}</td>
    <td>${gate(s)}</td></tr>`).join("");
  return `<div class="page-h"><h1>🚚 物流发货部</h1><span class="inc">🆕 新增模块</span><span class="tag-dept">发货待办</span></div>

    <div class="card"><div style="overflow-x:auto"><table><thead><tr><th>项目</th><th>名称</th><th>设计资料</th><th>电工资料</th><th>生产状态 🆕</th><th>仓库发货清单 🆕</th><th>收货信息</th><th>状态</th><th>发货闸门 🆕</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function pageReport(){
  const done=state.orders.filter(o=>o.status==="done");
  const avgOf=r=>r.effs.length?Math.round(r.effs.reduce((a,b)=>a+b,0)/r.effs.length):null;
  const rateOf=r=>r.done?Math.round(r.ontime/r.done*100):0;
  const byWorker={};
  state.orders.forEach(o=>{ const key=o.dept+"|"+o.wid; if(!byWorker[key]) byWorker[key]={dept:o.dept,wid:o.wid,total:0,done:0,ontime:0,over:0,effs:[]}; const r=byWorker[key]; r.total++; if(o.status==="done"){ r.done++; const e=effOf(o); if(e!=null){r.effs.push(e); if(o.done<=o.dueEnd) r.ontime++; else r.over++;} } });
  const people=Object.values(byWorker).sort((a,b)=>b.total-a.total);
  const byDept={}; ["design","electric","produce"].forEach(k=>byDept[k]={total:0,done:0,ontime:0,over:0,effs:[]});
  state.orders.forEach(o=>{ const r=byDept[o.dept]; if(!r) return; r.total++; if(o.status==="done"){ r.done++; const e=effOf(o); if(e!=null){r.effs.push(e); if(o.done<=o.dueEnd) r.ontime++; else r.over++;} } });
  const deptCards=["design","electric","produce"].map(k=>{ const r=byDept[k],d=DEPTS[k],avg=avgOf(r),rate=rateOf(r);
    return `<div class="dc"><h4>${d.ico} ${d.name}</h4><div class="row"><span>任务 / 完成</span><b>${r.total} / ${r.done}</b></div><div class="row"><span>逾期</span><b style="color:${r.over?'var(--danger)':'inherit'}">${r.over}</b></div><div class="row"><span>按时率</span><b>${r.done?rate+'%':'—'}</b></div><div class="row"><span>平均效率</span>${avg!=null?`<b class="eff ${avg<=100?'eff-good':'eff-bad'}">${avg}%</b>`:'<span class="muted">—</span>'}</div></div>`; }).join("");
  const rows=people.map(r=>{ const avg=avgOf(r),rate=rateOf(r);
    return `<tr><td>${DEPTS[r.dept].ico} ${DEPTS[r.dept].name}</td><td><b>${workerName(r.dept,r.wid)}</b></td><td>${r.total}</td><td>${r.done}</td><td>${r.ontime}</td><td>${r.over?`<span style="color:var(--danger)">${r.over}</span>`:0}</td><td>${r.done?`${rate}%<span class="minibar"><i style="width:${rate}%"></i></span>`:'—'}</td><td>${avg!=null?`<span class="eff ${avg<=100?'eff-good':'eff-bad'}">${avg}%</span>`:'—'}</td></tr>`; }).join("");
  const effBars=people.filter(r=>r.effs.length).map(r=>{ const avg=avgOf(r); const w=Math.max(Math.min(avg,200)/2,8);
    return `<div class="barrow"><span class="bl">${DEPTS[r.dept].ico} ${workerName(r.dept,r.wid)}</span><div class="bt"><div class="bf ${avg<=100?'good':'bad'}" style="width:${w}%">${avg}%</div></div></div>`; }).join("") || '<div class="empty">暂无完成数据</div>';
  const maxT=Math.max(1,...people.map(r=>r.total));
  const taskBars=people.map(r=>`<div class="barrow"><span class="bl">${DEPTS[r.dept].ico} ${workerName(r.dept,r.wid)}</span><div class="bt"><div class="bf" style="width:${Math.max(r.total/maxT*100,8)}%;background:linear-gradient(90deg,#60a5fa,#2563eb)">${r.total}</div></div></div>`).join("");
  const od=done.filter(o=>o.done>o.dueEnd);
  const odRows=od.map(o=>`<tr><td>${DEPTS[o.dept].ico} ${DEPTS[o.dept].name}</td><td>${workerName(o.dept,o.wid)}</td><td><span class="code" onclick="openDetail('${o.code}')">${o.code}</span></td><td>${o.dueEnd}</td><td>${o.done}</td><td><span class="pill p-overdue">超 ${days(o.dueEnd,o.done)} 天</span></td><td>${effCell(o)}</td></tr>`).join("");
  const allAvg=(()=>{ const es=done.map(effOf).filter(x=>x!=null); return es.length?Math.round(es.reduce((a,b)=>a+b,0)/es.length):null; })();
  return `<div class="page-h"><h1>📊 月度工作报表</h1><span class="inc">🆕 新增模块</span><span class="tag-dept">${thisMonth()}</span><div class="spacer"></div>
      <select class="btn btn-ghost btn-sm" style="padding:7px 10px"><option>全部部门</option><option>设计部</option><option>电工部</option><option>生产部</option></select>
      <select class="btn btn-ghost btn-sm" style="padding:7px 10px"><option>${thisMonth()}</option><option>上月</option></select>
      <button class="btn btn-ghost btn-sm" onclick="tryExport('月度报表')">⬇ 导出</button></div>
    <div class="page-desc">按部门 / 个人统计任务量、按时率、平均完成效率；含效率对比、任务量对比与逾期清单。</div>
    <div class="stat">
      <div class="sb"><div class="v" style="color:var(--primary)">${state.orders.length}</div><div class="l">本月任务总数</div></div>
      <div class="sb"><div class="v" style="color:var(--ok)">${done.length}</div><div class="l">已完成</div></div>
      <div class="sb"><div class="v" style="color:var(--danger)">${od.length}</div><div class="l">逾期</div></div>

function submitSalesOrder(){ const sfx=(document.getElementById("so_suffix")?val("so_suffix").trim().toUpperCase():""); const code=val("so_code").trim()+sfx,name=val("so_name").trim(); const req="（销售下单）";

    state.projects.unshift({code,name,qty:1,status:"进行中",sales:cu().name,salesUid:state.userId,sign:"",deliver:"",customer:val("so_customer").trim(),custType:val("so_ct"),contract:val("so_contract"),amount,taxRate:val("so_tax"),invoiceStatus:amount,invoiceApplied:false,prepay:+val("so_prepay")||0,beforeShip:+val("so_beforeship")||0,shipReceivable:+val("so_shiprecv")||0,balance:+val("so_balance")||0,shipDate:"",balDate:val("so_baldate")||"",designer:"—",drawStart:null,drawEnd:null,drawUse:"",elec:"—",dur:"-",elapsed:"-",remain:"-",sheets:{"钣金装配":false,"标准件清单":false,"外协外购":false,"原料下料单":false}});

    pushWx("lo1",`新项目 ${code} ${name} 已创建发货待办。`); }

   <div class="d-b">
    <div class="hint" style="margin-bottom:14px">销售主管/管理层可见，覆盖全部销售项目：合同额、开票进度、收款计划、按销售员业绩、客户分类与合同结构。</div>
    <div class="stat"><div class="sb"><div class="v" style="color:var(--primary)">${all.length}</div><div class="l">项目总数</div></div><div class="sb"><div class="v">${fmtMoney(totAmt)}</div><div class="l">合同总额</div></div><div class="sb"><div class="v" style="color:var(--ok)">${fmtMoney(invAmt)}</div><div class="l">已开票额（${invoiced.length}）</div></div><div class="sb"><div class="v" style="color:var(--danger)">${fmtMoney(pendAmt)}</div><div class="l">待开票额</div></div></div>
    <div class="stat" style="margin-top:10px"><div class="sb"><div class="v">${shippedN}/${all.length}</div><div class="l">已发货项目</div></div><div class="sb"><div class="v">${hasC}/${all.length}</div><div class="l">有合同</div></div><div class="sb"><div class="v">${all.length?Math.round(hasC/all.length*100):0}%</div><div class="l">合同覆盖率</div></div><div class="sb"><div class="v">${all.length?Math.round(invAmt/(totAmt||1)*100):0}%</div><div class="l">开票完成率</div></div></div>
    <div class="card" style="margin:14px 0"><div class="card-h">👤 销售员业绩明细</div><div style="overflow-x:auto"><table><thead><tr><th>销售员</th><th>项目数</th><th>合同额</th><th>已开票额</th><th>待收尾款</th><th>已发货</th><th>金额占比</th></tr></thead><tbody>${prows||'<tr><td colspan="7" class="empty">暂无数据</td></tr>'}</tbody></table></div></div>
    <div class="frow" style="align-items:flex-start">
      <div class="fg"><div class="card"><div class="card-h">🏷 客户分类分布</div><table><thead><tr><th>分类</th><th>项目</th><th>金额</th><th>占比</th></tr></thead><tbody>${catRows}</tbody></table></div></div>
      <div class="fg"><div class="card"><div class="card-h">🧾 开票状态分布</div><table><thead><tr><th>状态</th><th>项目</th><th>金额</th></tr></thead><tbody>${stRows}</tbody></table></div></div>
    </div>
    <div class="card" style="margin-top:14px"><div class="card-h">💰 收款计划汇总</div><table><thead><tr><th>款项</th><th>合计</th></tr></thead><tbody>${recvRows}<tr><td><b>合同总额</b></td><td class="num"><b>${fmtMoney(totAmt)}</b></td></tr></tbody></table></div>
   </div>
   <div class="d-f"><button class="btn btn-primary" onclick="closeModal()">关闭</button></div>`,'mid');
}
function pageWxBind(){
  const rows=Object.keys(USERS).map(id=>{ const u=USERS[id]; return `<tr><td>${u.name}</td><td>${u.role}</td><td>${u.wxid?`<span class="loc">${u.wxid}</span>`:'<span class="muted">未绑定</span>'}</td><td><input type="text" id="wx_${id}" placeholder="企微 userid" value="${u.wxid||''}" style="padding:6px 9px;border:1px solid var(--bd);border-radius:6px;font-size:13px"> <button class="btn btn-ghost btn-sm" onclick="bindWx('${id}')">${u.wxid?'更新':'绑定'}</button></td></tr>`;}).join("");
  return `<div class="page-h"><h1>📲 企业微信绑定</h1><span class="inc">🆕 新增模块</span><span class="tag-dept">用户 ↔ 企微 userid</span></div>
    <div class="page-desc">手动把系统用户绑定到企业微信成员 userid（F1）。绑定后完成/逾期/审批等通知即可推企微；凭证未到位前先落站内消息，不阻塞。</div>
    <div class="card"><div style="overflow-x:auto"><table><thead><tr><th>姓名</th><th>角色</th><th>企微 userid</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function bindWx(id){ const v=document.getElementById("wx_"+id).value.trim(); USERS[id].wxid=v; toast(v?`已绑定 ${USERS[id].name} → ${v}`:"已清空绑定","ok"); render(); }

/* ===== 🆕 装配组问题反馈流：装配组提交 → 生产主管审批 → 设计师接收/驳回 → 存档 ===== */
let fbSeq=10;
function designerUid(name){ return Object.keys(USERS).find(id=>USERS[id].type==="worker"&&USERS[id].dept==="design"&&USERS[id].name===name); }
function fbPill(s){ const m={"待主管审批":"p-pending","待设计接收":"p-drawing","已存档":"p-done","主管驳回":"p-overdue","设计驳回":"p-overdue"}; return `<span class="pill ${m[s]||'p-pending'}">${s}</span>`; }
function openFeedback(code){ const p=state.projects.find(x=>x.code===code);
  modal(`<div class="d-h"><b>📝 问题反馈 · ${code}</b><span class="x" onclick="closeModal()">×</span></div>
   <div class="d-b"><div class="hint" style="margin-bottom:14px">装配遇到的问题，提交后 → 生产部主管审批 → 回馈给设计师（${p?p.designer:'—'}）接收/驳回 → 接收后存档到本项目。</div>
    <div class="fg"><label>问题描述 <span class="req-star">*</span></label><textarea id="fb_text" placeholder="如：B02 机架孔位与图纸偏差，无法装配…"></textarea></div></div>
   <div class="d-f"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="submitFeedback('${code}')">提交反馈</button></div>`);
}
function submitFeedback(code){ const t=val("fb_text").trim(); if(!t){ toast("请填写问题描述","warn"); return; } const u=cu(); const p=state.projects.find(x=>x.code===code); fbSeq++; state.feedbacks.unshift({id:"fb"+fbSeq,code,text:t,by:u.wid,byName:u.name,designer:p?p.designer:"",state:"待主管审批",time:new Date().toLocaleString("zh-CN")}); pushWx("pm",`【问题反馈】${code} ${u.name} 提交问题待审批`); closeModal(); toast("问题反馈已提交，待生产部主管审批","ok"); render(); }
function approveFeedback(id,ok){ const fb=state.feedbacks.find(x=>x.id===id); if(!fb) return; if(ok){ fb.state="待设计接收"; const du=designerUid(fb.designer); if(du) pushWx(du,`【问题反馈】${fb.code} 生产部反馈待你接收`); toast("已通过，回馈设计师","ok"); } else { fb.state="主管驳回"; pushWx(fb.by,`【问题反馈被主管驳回】${fb.code}`); toast("已驳回","warn"); } render(); }
function acceptFeedback(id){ const fb=state.feedbacks.find(x=>x.id===id); if(!fb) return; fb.state="已存档"; pushWx(fb.by,`【问题反馈已受理】${fb.code} 设计师已接收并存档`); toast("已接收，存档至该项目问题反馈","ok"); render(); }
function rejectFeedback(id){ const fb=state.feedbacks.find(x=>x.id===id); if(!fb) return; fb.state="设计驳回"; pushWx(fb.by,`【问题反馈被设计驳回】${fb.code}`); toast("已驳回","warn"); render(); }
function produceFeedbackCard(u){ const codes=[...new Set(state.orders.filter(o=>o.dept==="produce"&&o.wid===u.wid).map(o=>o.code))]; const mine=state.feedbacks.filter(f=>f.by===u.wid);
  const btns=codes.length?codes.map(c=>`<button class="btn btn-ghost btn-sm" onclick="openFeedback('${c}')">📝 ${c} 提交反馈</button>`).join(" "):'<span class="muted">暂无在手项目</span>';
  const rows=mine.map(f=>`<tr><td>${f.code}</td><td style="text-align:left">${f.text}</td><td>${fbPill(f.state)}</td><td>${f.time}</td></tr>`).join("");
  return `<div class="card" style="margin-top:14px"><div class="card-h">📝 问题反馈（→ 生产主管审批 → 设计师）<span class="inc">🆕</span></div><div style="padding:12px">${btns}</div>${mine.length?`<table><thead><tr><th>项目</th><th>问题</th><th>状态</th><th>时间</th></tr></thead><tbody>${rows}</tbody></table>`:''}</div>`;
}
function produceFbApprovalCard(){ const list=state.feedbacks.filter(f=>f.state==="待主管审批"); const rows=list.map(f=>`<tr><td>${f.code}</td><td>${f.byName}</td><td style="text-align:left">${f.text}</td><td>${f.time}</td><td><button class="btn btn-ok btn-sm" onclick="approveFeedback('${f.id}',1)">通过(转设计)</button> <button class="btn btn-ghost btn-sm" onclick="approveFeedback('${f.id}',0)">驳回</button></td></tr>`).join("");
  return `<div class="card" style="margin-bottom:14px"><div class="card-h">📝 问题反馈审批（待审批 ${list.length}）<span class="inc">🆕</span></div><div style="overflow-x:auto"><table><thead><tr><th>项目</th><th>提交人</th><th>问题</th><th>时间</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty">暂无待审批</td></tr>'}</tbody></table></div></div>`;
}
function designFbReceiveCard(u){ const list=state.feedbacks.filter(f=>f.state==="待设计接收"&&f.designer===u.name); if(!list.length) return ''; const rows=list.map(f=>`<tr><td>${f.code}</td><td>${f.byName}</td><td style="text-align:left">${f.text}</td><td><button class="btn btn-ok btn-sm" onclick="acceptFeedback('${f.id}')">接收存档</button> <button class="btn btn-ghost btn-sm" onclick="rejectFeedback('${f.id}')">驳回</button></td></tr>`).join("");
  return `<div class="card" style="margin-top:14px"><div class="card-h">📥 待接收的问题反馈（${list.length}）<span class="inc">🆕</span></div><div style="overflow-x:auto"><table><thead><tr><th>项目</th><th>来自</th><th>问题</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function fbArchive(code){ const list=state.feedbacks.filter(f=>f.code===code); const rows=list.map(f=>`<tr><td style="text-align:left">${f.text}</td><td>${f.byName}</td><td>${f.designer||'—'}</td><td>${fbPill(f.state)}</td><td>${f.time}</td></tr>`).join("");
  return `<div class="card" style="margin-top:14px"><div class="card-h">📝 问题反馈（本项目存档）<span class="inc">🆕</span></div><div style="overflow-x:auto"><table><thead><tr><th>问题</th><th>提交(装配)</th><th>设计师</th><th>状态</th><th>时间</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty">暂无问题反馈</td></tr>'}</tbody></table></div></div>`;
}
function fileChip(f){ const nm=f.n||f.name; return `<span class="file-chip"><span class="fn" onclick="viewFile('${nm}','${f.t}')" title="预览">${fico(f.t)} ${nm}</span><span class="dl" onclick="downloadFile('${nm}')" title="下载">⬇</span></span>`; }
function files(arr){ return arr.map(fileChip).join(" "); }
function viewFile(name,type){
  const badge=type==='pdf'?'<span class="vb vb-pdf">PDF</span>':type==='xls'?'<span class="vb vb-xls">EXCEL</span>':type==='cad'?'<span class="vb vb-cad">CAD</span>':'<span class="vb vb-doc">WORD</span>';
  let inner; if(type==='xls'){ const data=[['1','序号','名称','规格','数量'],['2','1','减速电机','BLD1#-23','1'],['3','2','液压站','双路24V','1']]; inner=`<table class="xls-grid"><tr><th></th><th>A</th><th>B</th><th>C</th><th>D</th></tr>`+data.map(r=>`<tr><th>${r[0]}</th>${r.slice(1).map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")+`</table>`; }
  else if(type==='cad'){ inner=`<div class="doc-page" style="display:grid;place-items:center;color:#0891b2"><div style="text-align:center"><div style="font-size:46px">📐</div><div style="margin-top:10px">CAD 图纸预览（示意）</div></div></div>`; }
  else { inner=`<div class="doc-page"><h3>${name.replace(/\.[^.]+$/,"")}</h3><p style="text-align:center;color:#64748b">同辉智能装备（无锡）有限公司</p><p>一、概述：下单/产出的 ${type==='pdf'?'PDF':'Word'} 资料示意。</p><p>二、技术要求：材料304；按总装图执行。</p><div class="doc-foot">— 第 1 页 / 共 3 页 —</div></div>`; }
  modal(`<div class="d-h"><b>${badge} ${name}</b><span class="x" onclick="closeModal()">×</span></div><div class="d-b viewer"><div class="viewer-note">📄 原型预览（示意）——真实系统内嵌 PDF.js / Office / CAD 预览。</div>${inner}</div><div class="d-f"><button class="btn btn-ghost" onclick="downloadFile('${name}')">⬇ 下载</button><button class="btn btn-primary" onclick="closeModal()">关闭</button></div>`);
}
function viewSheet(code,name){ const p=state.projects.find(x=>x.code===code);
  modal(`<div class="d-h"><b>📄 ${name} · ${code}${p?' '+p.name:''}（只读预览）</b><span class="x" onclick="closeModal()">×</span></div>
  <div class="d-b viewer"><div class="viewer-note">📄 原型预览（示意）——该表源自设计部「四个数据表」，钣金组只读引用、不可编辑；真实系统内嵌表格/Excel 预览。</div>
  <table class="xls-grid"><tr><th>#</th><th>名称</th><th>图纸名称</th><th>材质</th><th>数量</th><th>备注</th></tr>
  <tr><td>1</td><td>${name}</td><td>B01-总图</td><td>304</td><td>1</td><td>—</td></tr>
  <tr><td>2</td><td>${name}</td><td>B02-机架</td><td>304</td><td>1</td><td>折弯</td></tr>
  <tr><td>3</td><td>${name}</td><td>B03-外罩</td><td>304</td><td>2</td><td>拉丝</td></tr></table></div>
  <div class="d-f"><button class="btn btn-ghost" onclick="downloadFile('${name}.xlsx')">⬇ 下载</button><button class="btn btn-primary" onclick="closeModal()">关闭</button></div>`); }
function downloadFile(name){ const blob=new Blob([`（原型占位文件）\n文件名：${name}`],{type:"application/octet-stream"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast("开始下载："+name,"ok"); }

function statusPill(o){ if(o.status==="待派") return '<span class="pill p-pending">待分派</span>'; if(o.status==="作废") return '<span class="pill p-pending" style="opacity:.55">已作废</span>'; if(o.status==="pending") return '<span class="pill p-pending">待接单</span>'; if(o.status==="drawing") return '<span class="pill p-drawing">进行中</span>'; if(o.status==="done"&&o.dueEnd&&o.done>o.dueEnd) return '<span class="pill p-overdue">逾期完成</span>'; return '<span class="pill p-done">已完成</span>'; }
function fico(t){ return t==="pdf"?"📕":t==="xls"?"📗":t==="cad"?"📐":"📘"; }
function modal(h,cls){ document.getElementById("modalRoot").innerHTML=`<div class="mask" onclick="if(event.target===this)closeModal()"><div class="dialog ${cls||''}">${h}</div></div>`; }
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }
function mselToggle(){ const p=document.getElementById("msel_panel"); if(!p) return; const show=p.style.display==="none"; p.style.display=show?"block":"none"; if(show){ const s=document.getElementById("msel_search"); s.value=""; mselFilter(""); s.focus(); } }
function mselFilter(q){ q=(q||"").toLowerCase().trim(); const list=document.getElementById("msel_list"); if(!list) return; let any=false; [...list.children].forEach(el=>{ if(el.classList.contains("msel-empty")) return; const k=el.getAttribute("data-k")||""; const ok=!q||k.indexOf(q)>=0; el.style.display=ok?"flex":"none"; if(ok)any=true; }); const em=document.getElementById("msel_empty"); if(em) em.style.display=any?"none":"block"; }
function mselPick(id){ const m=whM(id); document.getElementById("wio_mat").value=id; document.getElementById("msel_label").textContent=`${m.code} · ${m.name} ${m.spec}（现存 ${whStock(m.id)}）`; document.getElementById("msel_panel").style.display="none"; }
function pagePlaceholder(){ return `<div class="page-h"><h1>${([...MENUS,...ADMIN].find(m=>m.k===state.menu)||{}).t||""}</h1></div><div class="card"><div class="empty">现有页面（本设计图不改动），略</div></div>`; }
function toast(msg,type){ const c=type==="ok"?"#16a34a":type==="danger"?"#dc2626":type==="warn"?"#d97706":"#0f172a"; const r=document.getElementById("toastRoot"); r.innerHTML=`<div class="toast" style="background:${c}">${type==='danger'?'⚠':type==='ok'?'✓':'ℹ'} ${msg}</div>`; setTimeout(()=>r.innerHTML="",2800); }

render();
</script>
</body>
</html>
