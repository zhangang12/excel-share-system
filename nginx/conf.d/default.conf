# 🆕 限频：防登录密码爆破（每 IP 登录约 10 次/分，突发 5 次），超限返回 429
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
limit_req_status 429;

# HTTP 入口（启用 HTTPS 后改为 301 跳转到 https）
server {
    listen 80;
    server_name _;     # 替换成你的域名，如 pms.your-company.com
    server_tokens off;                                       # 🆕 隐藏 nginx 版本号

    # 🆕 安全响应头：防点击劫持 / MIME 嗅探 / 控制 referer 泄露
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ACME http-01 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 临时直接走 HTTP；申请 SSL 后请改为：
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # 前端
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🆕 登录限频：单独对登录接口限频防爆破（其余 /api/ 不限频，避免误伤正常高频请求）
    location = /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}

