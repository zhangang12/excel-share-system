services:
  postgres:
    image: postgres:16-alpine
    container_name: pms2_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pms_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-pms}
    ports:
      - "127.0.0.1:5432:5432"   # 🆕 只绑本地，防止把数据库暴露到公网
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pms2_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pms}:${POSTGRES_PASSWORD:-pms_dev_pwd}@postgres:5432/${POSTGRES_DB:-pms}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-please-change}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pms2_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
