# 前端 SPA 静态托管（被 Dockerfile.prod COPY 进 nginx 镜像）。
# 关键：HTML5 history 路由(如 /sales、/messages)直接刷新/外链时，nginx 找不到对应文件，
# 必须回退到 index.html 交给 Vue Router 处理，否则 404（修复 8.x.x.x/sales 刷新 404）。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 带 hash 的构建产物可长缓存（文件名变化即失效）
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA 路由兜底：真实文件/目录存在就返回，否则回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，保证每次部署后前端能拿到最新入口
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
